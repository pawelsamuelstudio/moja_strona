<script>
    const layers = document.querySelectorAll(".layer");

    layers.forEach(layer => {
        const w = layer.dataset.width;
        const x = layer.dataset.x;
        const y = layer.dataset.y;
        const z = layer.dataset.z || 0;
        layer.style.width = w + "px";
        layer.style.left = "50%";
        layer.style.top = "50%";
        layer.style.zIndex = z;
        layer.style.transform = `translate(calc(${x}% - 50%), calc(${y}% - 50%))`;
    });

    window.addEventListener("load", () => {
        layers.forEach((layer, index) => {
            setTimeout(() => {
                layer.classList.add("show");
            }, index * 500);
        });
    });

    window.addEventListener("scroll", () => {
        const scrollTop = window.scrollY;
        layers.forEach(layer => {
            const speed = parseFloat(layer.dataset.speed);
            const x = layer.dataset.x;
            const y = layer.dataset.y;
            layer.style.transform = `translate(calc(${x}% - 50%), calc(${y}% - 50% + ${scrollTop / speed}px))`;
        });
    });

    const video = document.getElementById("myVideo");
    function playPause() {
        if (video.style.display === "none") video.style.display = "block";
        if (video.paused) {video.play();} else {video.pause();}
    }
    function muteUnmute() {
        video.muted = !video.muted;
    }

    const hamburger = document.getElementById("hamburger");
    const navLeft = document.getElementById("nav-left");
    const navRight = document.getElementById("nav-right");
    hamburger.addEventListener("click", () => {
        hamburger.classList.toggle("active");
        navLeft.classList.toggle("show");
        navRight.classList.toggle("show");
    });
</script>
<script>
window.addEventListener('scroll', () => {
  const frame = document.querySelector('.frame');
  const image = frame.querySelector('.frame-image');

  const rect = frame.getBoundingClientRect();
  const speed = 0.3; 


  const offset = rect.top * speed;
  image.style.transform = `translateY(${+offset}px)`;
});
</script>

<script>
document.addEventListener("scroll", () => {
  const logo = document.getElementById("header-logo");
  const scrollTop = window.scrollY;             
  const docHeight = document.body.scrollHeight;
  const winHeight = window.innerHeight;        
  const scrollPercent = (scrollTop / (docHeight - winHeight)) * 100;

  if (scrollPercent >= 10) {
    logo.classList.add("visible");
  } else {
    logo.classList.remove("visible");
  }
});
</script>
